<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Logo Options</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0F1F17; color: white; padding: 60px; display: flex; gap: 60px; justify-content: center; align-items: flex-start; min-height: 100vh; }
.option { text-align: center; }
.option h3 { margin-top: 16px; font-size: 13px; opacity: 0.5; }
.logo-row { display: flex; gap: 24px; align-items: center; margin-top: 12px; }
.logo-row span { font-size: 11px; opacity: 0.3; }
</style>
</head>
<body>

<div class="option">
  <h2>Option 1: Clean Monk + Pulse</h2>
  <h3>MDI meditation icon with pulse overlay</h3>
  <div class="logo-row">
    <!-- Large -->
    <svg width="80" height="80" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <!-- Monk silhouette from MDI -->
      <g transform="translate(8, 6) scale(1.35)" opacity="0.25">
        <path fill="white" d="M12 4c1.11 0 2 .89 2 2s-.89 2-2 2s-2-.89-2-2s.9-2 2-2m9 12v-2c-2.24 0-4.16-.96-5.6-2.68l-1.34-1.6A1.98 1.98 0 0 0 12.53 9H11.5c-.61 0-1.17.26-1.55.72l-1.34 1.6C7.16 13.04 5.24 14 3 14v2c2.77 0 5.19-1.17 7-3.25V15l-3.88 1.55c-.67.27-1.12.95-1.12 1.66C5 19.2 5.8 20 6.79 20H9v-.5a2.5 2.5 0 0 1 2.5-2.5h3c.28 0 .5.22.5.5s-.22.5-.5.5h-3c-.83 0-1.5.67-1.5 1.5v.5h7.21c.99 0 1.79-.8 1.79-1.79c0-.71-.45-1.39-1.12-1.66L14 15v-2.25c1.81 2.08 4.23 3.25 7 3.25"/>
      </g>
      <!-- Pulse line -->
      <path d="M5 26H15L18.5 16L23 36L27.5 22L31 26H43" stroke="white" strokeWidth="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Medium -->
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <g transform="translate(8, 6) scale(1.35)" opacity="0.25">
        <path fill="white" d="M12 4c1.11 0 2 .89 2 2s-.89 2-2 2s-2-.89-2-2s.9-2 2-2m9 12v-2c-2.24 0-4.16-.96-5.6-2.68l-1.34-1.6A1.98 1.98 0 0 0 12.53 9H11.5c-.61 0-1.17.26-1.55.72l-1.34 1.6C7.16 13.04 5.24 14 3 14v2c2.77 0 5.19-1.17 7-3.25V15l-3.88 1.55c-.67.27-1.12.95-1.12 1.66C5 19.2 5.8 20 6.79 20H9v-.5a2.5 2.5 0 0 1 2.5-2.5h3c.28 0 .5.22.5.5s-.22.5-.5.5h-3c-.83 0-1.5.67-1.5 1.5v.5h7.21c.99 0 1.79-.8 1.79-1.79c0-.71-.45-1.39-1.12-1.66L14 15v-2.25c1.81 2.08 4.23 3.25 7 3.25"/>
      </g>
      <path d="M5 26H15L18.5 16L23 36L27.5 22L31 26H43" stroke="white" strokeWidth="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Small -->
    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <g transform="translate(8, 6) scale(1.35)" opacity="0.25">
        <path fill="white" d="M12 4c1.11 0 2 .89 2 2s-.89 2-2 2s-2-.89-2-2s.9-2 2-2m9 12v-2c-2.24 0-4.16-.96-5.6-2.68l-1.34-1.6A1.98 1.98 0 0 0 12.53 9H11.5c-.61 0-1.17.26-1.55.72l-1.34 1.6C7.16 13.04 5.24 14 3 14v2c2.77 0 5.19-1.17 7-3.25V15l-3.88 1.55c-.67.27-1.12.95-1.12 1.66C5 19.2 5.8 20 6.79 20H9v-.5a2.5 2.5 0 0 1 2.5-2.5h3c.28 0 .5.22.5.5s-.22.5-.5.5h-3c-.83 0-1.5.67-1.5 1.5v.5h7.21c.99 0 1.79-.8 1.79-1.79c0-.71-.45-1.39-1.12-1.66L14 15v-2.25c1.81 2.08 4.23 3.25 7 3.25"/>
      </g>
      <path d="M5 26H15L18.5 16L23 36L27.5 22L31 26H43" stroke="white" strokeWidth="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<div class="option">
  <h2>Option 2: Lotus Monk + Pulse</h2>
  <h3>Seated meditation with lotus, pulse through center</h3>
  <div class="logo-row">
    <svg width="80" height="80" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <!-- Simple monk sitting -->
      <g opacity="0.3">
        <circle cx="24" cy="13" r="4" fill="white"/>
        <path d="M16 34C16 34 17 26 18 24C19 22 21 20 24 20C27 20 29 22 30 24C31 26 32 34 32 34" fill="white"/>
        <!-- Lotus base -->
        <ellipse cx="24" cy="35" rx="11" ry="3" fill="white" opacity="0.5"/>
      </g>
      <!-- Pulse -->
      <path d="M5 25H14L17 17L22 33L27 21L30 25H43" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <g opacity="0.3">
        <circle cx="24" cy="13" r="4" fill="white"/>
        <path d="M16 34C16 34 17 26 18 24C19 22 21 20 24 20C27 20 29 22 30 24C31 26 32 34 32 34" fill="white"/>
        <ellipse cx="24" cy="35" rx="11" ry="3" fill="white" opacity="0.5"/>
      </g>
      <path d="M5 25H14L17 17L22 33L27 21L30 25H43" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <g opacity="0.3">
        <circle cx="24" cy="13" r="4" fill="white"/>
        <path d="M16 34C16 34 17 26 18 24C19 22 21 20 24 20C27 20 29 22 30 24C31 26 32 34 32 34" fill="white"/>
        <ellipse cx="24" cy="35" rx="11" ry="3" fill="white" opacity="0.5"/>
      </g>
      <path d="M5 25H14L17 17L22 33L27 21L30 25H43" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<div class="option">
  <h2>Option 3: Just Pulse (no monk)</h2>
  <h3>Clean heartbeat only — bold and simple</h3>
  <div class="logo-row">
    <svg width="80" height="80" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <path d="M6 26H14L18 15L24 37L30 19L34 26H42" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <path d="M6 26H14L18 15L24 37L30 19L34 26H42" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#16A34A"/>
      <path d="M6 26H14L18 15L24 37L30 19L34 26H42" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

</body>
</html>
