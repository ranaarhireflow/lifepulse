<!DOCTYPE html>
<html>
<head><title>Generate App Icons</title></head>
<body>
<h2>Right-click each canvas and "Save image as" with the filename shown</h2>
<p>Or open browser console and run: generateAll()</p>
<div id="canvases"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#6366f1');
  grad.addColorStop(1, '#8b5cf6');
  ctx.fillStyle = grad;

  // Rounded rect
  const r = s * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Letter "T"
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s * 0.55}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('T', s / 2, s / 2 + s * 0.02);

  // Small checkmark
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = s * 0.04;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s * 0.62, s * 0.72);
  ctx.lineTo(s * 0.72, s * 0.82);
  ctx.lineTo(s * 0.85, s * 0.65);
  ctx.stroke();
}

function generateAll() {
  sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    drawIcon(canvas, size);

    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

const container = document.getElementById('canvases');
sizes.forEach(size => {
  const div = document.createElement('div');
  div.style.margin = '10px';
  div.style.display = 'inline-block';

  const label = document.createElement('p');
  label.textContent = `icon-${size}.png`;

  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  canvas.style.border = '1px solid #ccc';
  canvas.style.maxWidth = '128px';
  drawIcon(canvas, size);

  div.appendChild(label);
  div.appendChild(canvas);
  container.appendChild(div);
});
</script>
</body>
</html>
